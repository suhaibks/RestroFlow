<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="dashboard.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    location.href = "login.html";
}
</script>

</head>
<body>

<header class="topbar">
    <h2>RestroFlow</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="branches.html" class="nav-link">Branches</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
    </aside>

    <!-- Main Content -->
    <main class="main">

        <h1>Dashboard Overview</h1>

        <!-- Stats Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Orders</h3>
                <p id="totalOrders">0</p>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="totalRevenue">₹0</p>
            </div>

            <div class="card">
                <h3>Total Branches</h3>
                <p id="totalBranches">0</p>
            </div>

            <div class="card">
                <h3>Active Orders</h3>
                <p id="activeOrders">0</p>
            </div>

        </div>

        <!-- Recent Orders -->
        <h2 style="margin-top:40px;">Recent Orders</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Branch</th>
                    <th>Items</th>
                    <th>Status</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="recentOrdersTable"></tbody>
        </table>

    </main>

</div>

<script>

/* Logout */
function logout(){
    if(confirm("Logout from dashboard?")){
        localStorage.removeItem("loggedIn");
        location.href = "index.html";
    }
}

/* Load Dashboard Data */
function loadDashboard(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let branches = JSON.parse(localStorage.getItem("branches")) || [];

    let totalRevenue = 0;
    let activeOrders = 0;

    orders.forEach(order => {

        totalRevenue += Number(order.amount || 0);

        if(order.status === "Pending" || order.status === "Preparing"){
            activeOrders++;
        }

    });

    /* Fill cards */
    document.getElementById("totalOrders").innerText = orders.length;
    document.getElementById("totalRevenue").innerText = "₹" + totalRevenue;
    document.getElementById("totalBranches").innerText = branches.length;
    document.getElementById("activeOrders").innerText = activeOrders;

    /* Recent Orders */
    let table = document.getElementById("recentOrdersTable");
    table.innerHTML = "";

    let recentOrders = orders.slice(-5).reverse();

    recentOrders.forEach(order => {

        table.innerHTML += `
            <tr>
                <td>#${order.id}</td>
                <td>${order.branch}</td>
                <td>${order.items}</td>
                <td>${order.status}</td>
                <td>₹${order.amount}</td>
            </tr>
        `;

    });

    if(recentOrders.length === 0){
        table.innerHTML = `
            <tr>
                <td colspan="5" style="text-align:center;padding:20px;color:#666;">
                    No recent orders available
                </td>
            </tr>
        `;
    }

}

loadDashboard();

/* Active Sidebar Highlight */
const currentPage = location.pathname.split("/").pop();

document.querySelectorAll(".nav-link").forEach(link => {
    if(link.getAttribute("href") === currentPage){
        link.classList.add("active");
    }
});

</script>

</body>
</html>
