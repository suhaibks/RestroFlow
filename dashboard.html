<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>
</head>
<body>

<header class="topbar">
  <h2>RestroFlow</h2>
  <div class="user">
    <span>Welcome</span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Menu</a>
    <a href="#">Branches</a>
  </aside>

  <main class="main">
    <h1>Dashboard</h1>

    <div class="data-row">Total Orders: 120</div>
    <div class="data-row">Revenue: ₹45,000</div>
    <div class="data-row">Branches: 5</div>

  </main>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}
</script>

</body>
</html>
