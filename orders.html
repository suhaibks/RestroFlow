<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Orders</h1>

<h2>Incoming Orders</h2>
<table>
<thead>
<tr>
<th>ID</th><th>Branch</th><th>Items</th><th>Amount</th><th>Status</th>
</tr>
</thead>
<tbody id="incomingOrders"></tbody>
</table>

<h2 style="margin-top:40px;">All Orders</h2>
<table>
<thead>
<tr>
<th>ID</th><th>Branch</th><th>Items</th><th>Amount</th><th>Status</th><th>Time</th>
</tr>
</thead>
<tbody id="allOrders"></tbody>
</table>

</main>
</div>

<script>

function logout(){
if(confirm("Logout?")){
localStorage.removeItem("loggedIn");
location.href="login.html";
}
}

/* FIX old data */
function fixOldOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.forEach(o=>{
if(!o.time){
o.time=new Date().toISOString();
}
});
localStorage.setItem("orders",JSON.stringify(orders));
}

/* generate */
function generateOrder(){
let branches=JSON.parse(localStorage.getItem("branches"))||[];
if(branches.length===0)return;

let random=branches[Math.floor(Math.random()*branches.length)].name;

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
id:Date.now(),
branch:random,
items:"Pizza, Burger",
amount:Math.floor(Math.random()*500)+100,
status:"Pending",
time:new Date().toISOString()
});

localStorage.setItem("orders",JSON.stringify(orders));
}

/* update status */
function updateStatus(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.forEach(o=>{
if(o.status==="Pending")o.status="Preparing";
else if(o.status==="Preparing")o.status="Delivered";
});
localStorage.setItem("orders",JSON.stringify(orders));
}

/* load */
function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];

incomingOrders.innerHTML="";
allOrders.innerHTML="";

let count=0;

orders.forEach(o=>{

let time=new Date(o.time).toLocaleString();

if(o.status==="Pending"){
count++;
incomingOrders.innerHTML+=`
<tr>
<td>#${o.id}</td>
<td>${o.branch}</td>
<td>${o.items}</td>
<td>₹${o.amount}</td>
<td>${o.status}</td>
</tr>`;
}

allOrders.innerHTML+=`
<tr>
<td>#${o.id}</td>
<td>${o.branch}</td>
<td>${o.items}</td>
<td>₹${o.amount}</td>
<td>${o.status}</td>
<td>${time}</td>
</tr>`;
});

if(count===0){
incomingOrders.innerHTML=`
<tr><td colspan="5" style="text-align:center;color:#666;padding:20px;">
Waiting for incoming orders...
</td></tr>`;
}
}

fixOldOrders();

setInterval(()=>{
generateOrder();
updateStatus();
loadOrders();
},6000);

loadOrders();

/* nav */
const p=location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
if(l.getAttribute("href")===p)l.classList.add("active");
});
</script>

</body>
</html>
