<!DOCTYPE html>
<html>

  <title>Signup</title>

</head>
<body>

  <h2>RestroFlow</h2>
</header>

<div class="auth-box">
  <h2>Create Account</h2>

<footer>

<script src="auth.js"></script>

</html>
